<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RUL Records</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><main class="wrap"><section class="grid two" id="recordsRoot"></section></main><script src="static-data.js"></script><script src="sheet-config.js"></script><script src="utils.js"></script><script src="data-service.js"></script><script src="analytics.js"></script><script src="layout.js"></script><script>loadLeagueData().then(data => { pageHeader(data, 'stats.html', 'League', 'Records', 'RUL History'); pageFooter(data); document.getElementById('recordsRoot').innerHTML = data.records.map(record => `<article class="card"><h2 class="card-title">${escapeHtml(record.title)}</h2>${record.items.map(item => `<div class="row"><span><strong>${item.rank}. ${playerLink(item.player)}</strong><br><span class="muted">${escapeHtml(item.note || '')}</span></span><strong>${escapeHtml(item.value)}</strong></div>`).join('')}</article>`).join(''); });</script></body></html>
