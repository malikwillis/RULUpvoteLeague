<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUL Hard Reset</title>
  <style>
    body {
      margin: 0;
      background: #05060a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .card {
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 22px;
      background: rgba(255,255,255,.05);
      max-width: 680px;
      margin: 40px auto;
    }

    button, a {
      display: inline-block;
      margin-top: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.2);
      background: #e0ff2b;
      color: black;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    p {
      color: #a9adbd;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>RUL Hard Reset</h1>
    <p>This clears broken saved preview data on this device.</p>
    <button id="clearBtn">Clear Broken Data</button>
    <a href="index.html">Go Home</a>
    <p id="status"></p>
  </div>

  <script>
    const keys = [
      'RUL_WORKING_DATA',
      'RUL_LOCAL_DATA',
      'RUL_PREVIEW_DATA'
    ];

    function clearIt() {
      keys.forEach(key => localStorage.removeItem(key));
      document.getElementById('status').textContent = 'Cleared. Tap Go Home.';
    }

    document.getElementById('clearBtn').addEventListener('click', clearIt);
    clearIt();
  </script>
</body>
</html>
