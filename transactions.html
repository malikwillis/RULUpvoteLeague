<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RUL Transactions</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body><main class="wrap"><div class="toolbar"><button class="btn" data-filter="All">All</button><button class="btn" data-filter="Trade">Trades</button><button class="btn" data-filter="Waiver">Waivers</button><button class="btn" data-filter="Site Update">Updates</button><button class="btn" id="openModal">Log Transaction</button></div><section class="card" id="txList"></section></main><div class="modal" id="txModal"><div class="modal-card"><h2 class="card-title">Commissioner Transaction Logger</h2><p class="note">This saves in your browser. To make a transaction permanent for everyone, copy it into assets/js/static-data.js.</p><div class="form-grid" style="margin-top:12px"><input id="pass" placeholder="Password"><select id="type"><option>Trade</option><option>Waiver</option><option>Retirement</option><option>Unretirement</option><option>Site Update</option><option>Other</option></select><input id="title" placeholder="Transaction title"><textarea id="desc" placeholder="Description"></textarea><button class="btn" id="saveTx">Save</button><button class="btn" data-close="true">Close</button></div></div></div><script src="static-data.js"></script><script src="sheet-config.js"></script><script src="utils.js"></script><script src="data-service.js"></script><script src="layout.js"></script><script src="transactions-page.js"></script></body></html>
